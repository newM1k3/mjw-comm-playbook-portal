[build]
  command = "npm run build"
  publish = "dist"

[functions]
  node_bundler = "esbuild"

# Route /api/* calls to Netlify Functions (Stripe checkout + webhook)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback — must come last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
